services:
  gateway:
    volumes:
      - ./gateway/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./gateway/conf.d/:/etc/nginx/conf.d/:ro
      - ./gateway/lua/:/usr/local/openresty/nginx/lua/:ro
    develop:
      watch:
        - action: sync+restart
          path: ./gateway/lua/
          target: /usr/local/openresty/nginx/lua/
        - action: sync+restart
          path: ./gateway/conf.d/
          target: /etc/nginx/conf.d/
        - action: sync+restart
          path: ./gateway/nginx.conf
          target: /usr/local/openresty/nginx/conf/nginx.conf

  frontend:
    ports:
      - "3000:3000"
    environment:
      - CI=true
      - WATCHPACK_POLLING=true
    command: ["sh", "-c", "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev --hostname 0.0.0.0"]

  api:
    command: ["sh", "-c", "alembic upgrade head && uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend/shared/src:/app/shared/src
      - ./backend/api/src:/app/api/src

  db:
    ports:
      - "15432:5432"
