services:
  api:
    volumes:
      - ./backend:/app
    environment:
      - WATCHFILES_FORCE_POLLING=true
      - WATCHFILES_POLL_DELAY_MS=1000

  frontend:
    build:
      dockerfile: ../docker/frontend.dev.Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  db:
    ports:
      - "15432:5432"
