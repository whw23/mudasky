name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/mudasky
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 检测哪些服务的代码有改动
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      frontend: ${{ steps.filter.outputs.frontend }}
      api: ${{ steps.filter.outputs.api }}
      db: ${{ steps.filter.outputs.db }}
      deploy: ${{ steps.filter.outputs.deploy }}
      any_build: ${{ steps.filter.outputs.gateway == 'true' || steps.filter.outputs.frontend == 'true' || steps.filter.outputs.api == 'true' || steps.filter.outputs.db == 'true' }}
      any: ${{ steps.filter.outputs.gateway == 'true' || steps.filter.outputs.frontend == 'true' || steps.filter.outputs.api == 'true' || steps.filter.outputs.db == 'true' || steps.filter.outputs.deploy == 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            gateway:
              - 'gateway/**'
              - '!gateway/**/*.md'
            frontend:
              - 'frontend/**'
              - '!frontend/e2e/**'
              - '!frontend/**/*.test.*'
              - '!frontend/vitest.config.ts'
              - '!frontend/test-results/**'
              - '!frontend/**/*.md'
            api:
              - 'backend/**'
              - '!backend/api/tests/**'
              - '!backend/**/*.md'
            db:
              - 'db/Dockerfile'
            deploy:
              - 'docker-compose.yml'
              - 'db/init.sql'

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.any_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: 生成版本号
        id: version
        run: echo "tag=$(TZ=Asia/Shanghai date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 gateway 镜像
        if: needs.detect-changes.outputs.gateway == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./gateway
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-gateway:latest
          build-args: BUILD_VERSION=${{ steps.version.outputs.tag }}
          labels: org.opencontainers.image.revision=${{ github.sha }}

      - name: 构建并推送 frontend 镜像
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-frontend:latest
          build-args: BUILD_VERSION=${{ steps.version.outputs.tag }}
          labels: org.opencontainers.image.revision=${{ github.sha }}

      - name: 构建并推送 api 镜像
        if: needs.detect-changes.outputs.api == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/api/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-api:latest
          build-args: BUILD_VERSION=${{ steps.version.outputs.tag }}
          labels: org.opencontainers.image.revision=${{ github.sha }}

      - name: 构建并推送 db 镜像
        if: needs.detect-changes.outputs.db == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./db
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-db:latest

  cleanup-registry:
    needs: build-and-push
    if: always() && needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    strategy:
      matrix:
        package: [mudasky-gateway, mudasky-frontend, mudasky-api, mudasky-db]

    steps:
      - name: 清理 ghcr.io 旧版本
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 1

  deploy:
    needs: [detect-changes, build-and-push]
    if: always() && needs.detect-changes.outputs.any == 'true' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: 生成版本号
        id: version
        run: echo "tag=$(TZ=Asia/Shanghai date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: 同步部署配置到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml,db/init.sql"
          target: "~/mudasky"
          overwrite: true

      - name: 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/mudasky

            # 登录 ghcr.io
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # 拉取最新镜像
            docker compose -f docker-compose.yml pull

            # 持久化 db 版本号，重启后不丢失
            DB_VER="${{ steps.version.outputs.tag }}"
            grep -q '^DB_VERSION=' .env 2>/dev/null \
              && sed -i "s/^DB_VERSION=.*/DB_VERSION=${DB_VER}/" .env \
              || echo "DB_VERSION=${DB_VER}" >> .env

            # 滚动更新
            docker compose -f docker-compose.yml up -d --remove-orphans

            # 清理旧镜像
            docker image prune -af --filter "until=1h"

            # 健康检查
            sleep 10
            curl -sf http://localhost/api/health || exit 1
            echo "部署成功"
