name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/mudasky
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # 检测哪些服务的代码有改动
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      frontend: ${{ steps.filter.outputs.frontend }}
      api: ${{ steps.filter.outputs.api }}
      db: ${{ steps.filter.outputs.db }}
      deploy: ${{ steps.filter.outputs.deploy }}
      any_build: ${{ steps.filter.outputs.gateway == 'true' || steps.filter.outputs.frontend == 'true' || steps.filter.outputs.api == 'true' || steps.filter.outputs.db == 'true' }}
      any: ${{ steps.filter.outputs.gateway == 'true' || steps.filter.outputs.frontend == 'true' || steps.filter.outputs.api == 'true' || steps.filter.outputs.db == 'true' || steps.filter.outputs.deploy == 'true' }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            gateway:
              - 'gateway/**'
              - '!gateway/**/*.md'
            frontend:
              - 'frontend/**'
              - '!frontend/e2e/**'
              - '!frontend/**/*.test.*'
              - '!frontend/vitest.config.ts'
              - '!frontend/test-results/**'
              - '!frontend/**/*.md'
            api:
              - 'backend/**'
              - '!backend/api/tests/**'
              - '!backend/**/*.md'
            db:
              - 'db/Dockerfile'
            deploy:
              - 'docker-compose.yml'
              - 'db/init.sql'

  build-gateway:
    needs: detect-changes
    if: needs.detect-changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: 生成版本号
        id: version
        run: echo "tag=$(TZ=Asia/Shanghai date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 构建并推送镜像
        uses: docker/build-push-action@v7
        with:
          context: ./gateway
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mudasky-gateway:latest
          build-args: BUILD_VERSION=${{ steps.version.outputs.tag }}
          labels: org.opencontainers.image.revision=${{ github.sha }}

  build-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: 生成版本号
        id: version
        run: echo "tag=$(TZ=Asia/Shanghai date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 构建并推送镜像
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mudasky-frontend:latest
          build-args: BUILD_VERSION=${{ steps.version.outputs.tag }}
          labels: org.opencontainers.image.revision=${{ github.sha }}

  build-api:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: 生成版本号
        id: version
        run: echo "tag=$(TZ=Asia/Shanghai date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 构建并推送镜像
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mudasky-api:latest
          build-args: BUILD_VERSION=${{ steps.version.outputs.tag }}
          labels: org.opencontainers.image.revision=${{ github.sha }}

  build-db:
    needs: detect-changes
    if: needs.detect-changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 构建并推送镜像
        uses: docker/build-push-action@v7
        with:
          context: ./db
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mudasky-db:latest

  test-backend-unit:
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 安装 uv
        uses: astral-sh/setup-uv@v6
      - name: 运行后端单元测试
        run: uv run --project backend/api python -m pytest backend/api/tests/ -v --ignore=backend/api/tests/e2e

  test-frontend-unit:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: 安装依赖
        run: pnpm --prefix frontend install
      - name: 运行前端单元测试
        run: pnpm --prefix frontend test

  cleanup-registry:
    needs: [build-gateway, build-frontend, build-api, build-db]
    if: >-
      !cancelled()
      && (needs.build-gateway.result == 'success'
          || needs.build-frontend.result == 'success'
          || needs.build-api.result == 'success'
          || needs.build-db.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      packages: write

    strategy:
      matrix:
        include:
          - package: mudasky-gateway
            should_run: ${{ needs.build-gateway.result == 'success' }}
          - package: mudasky-frontend
            should_run: ${{ needs.build-frontend.result == 'success' }}
          - package: mudasky-api
            should_run: ${{ needs.build-api.result == 'success' }}
          - package: mudasky-db
            should_run: ${{ needs.build-db.result == 'success' }}

    steps:
      - name: 清理 ghcr.io 旧版本
        if: matrix.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ matrix.package }}
        run: |
          gh api \
            "users/${OWNER}/packages/container/${PACKAGE}/versions" \
            --paginate --jq '.[].id' \
          | tail -n +2 \
          | while read -r vid; do
              gh api --method DELETE \
                "users/${OWNER}/packages/container/${PACKAGE}/versions/${vid}" \
                2>/dev/null || true
            done

  deploy:
    needs: [detect-changes, build-gateway, build-frontend, build-api, build-db, test-backend-unit, test-frontend-unit]
    if: >-
      !cancelled()
      && needs.detect-changes.outputs.any == 'true'
      && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: 生成版本号
        id: version
        run: echo "tag=$(TZ=Asia/Shanghai date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: 生成环境变量文件
        run: |
          mkdir -p env

          cat > env/backend.env << 'ENVEOF'
          DEBUG=false
          DB_HOST=db
          DB_PORT=5432
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}
          SMS_ACCESS_KEY_ID=${{ secrets.SMS_ACCESS_KEY_ID }}
          SMS_ACCESS_KEY_SECRET=${{ secrets.SMS_ACCESS_KEY_SECRET }}
          SMS_SIGN_NAME=${{ vars.SMS_SIGN_NAME }}
          SMS_TEMPLATE_CODE=${{ vars.SMS_TEMPLATE_CODE }}
          SMS_REGION=${{ vars.SMS_REGION }}
          MAX_UPLOAD_SIZE_MB=${{ vars.MAX_UPLOAD_SIZE_MB }}
          DEFAULT_STORAGE_QUOTA_MB=${{ vars.DEFAULT_STORAGE_QUOTA_MB }}
          SEED_USER_1_USERNAME=${{ secrets.SEED_USER_1_USERNAME }}
          SEED_USER_1_PASSWORD=${{ secrets.SEED_USER_1_PASSWORD }}
          SEED_USER_2_USERNAME=${{ secrets.SEED_USER_2_USERNAME }}
          SEED_USER_2_PASSWORD=${{ secrets.SEED_USER_2_PASSWORD }}
          SEED_USER_2_PHONE=${{ secrets.SEED_USER_2_PHONE }}
          SEED_USER_3_USERNAME=${{ secrets.SEED_USER_3_USERNAME }}
          SEED_USER_3_PASSWORD=${{ secrets.SEED_USER_3_PASSWORD }}
          SEED_USER_3_PHONE=${{ secrets.SEED_USER_3_PHONE }}
          CONTACT_ADDRESS=${{ vars.CONTACT_ADDRESS }}
          CONTACT_PHONE=${{ vars.CONTACT_PHONE }}
          CONTACT_EMAIL=${{ vars.CONTACT_EMAIL }}
          CONTACT_WECHAT=${{ vars.CONTACT_WECHAT }}
          CONTACT_REGISTERED_ADDRESS=${{ vars.CONTACT_REGISTERED_ADDRESS }}
          ENVEOF

          cat > env/gateway.env << 'ENVEOF'
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ACCESS_TOKEN_EXPIRE_MINUTES=${{ vars.ACCESS_TOKEN_EXPIRE_MINUTES }}
          REFRESH_TOKEN_EXPIRE_DAYS=${{ vars.REFRESH_TOKEN_EXPIRE_DAYS }}
          INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}
          ENVEOF

          cat > env/db.env << 'ENVEOF'
          POSTGRES_DB=${{ secrets.DB_NAME }}
          POSTGRES_USER=${{ secrets.DB_USER }}
          POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
          ENVEOF

          cat > env/worker.env << 'ENVEOF'
          DB_HOST=db
          DB_PORT=5432
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          ENVEOF

      - name: 配置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
        env:
          SSH_AUTH_SOCK: ""

      - name: 同步部署配置到服务器
        env:
          SSH_DEST: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          SSH_OPTS: -P ${{ secrets.SERVER_PORT }} -i ~/.ssh/deploy_key
        run: |
          # 确保服务器目录结构存在
          ssh -p ${{ secrets.SERVER_PORT }} -i ~/.ssh/deploy_key ${SSH_DEST} \
            "mkdir -p ~/mudasky/db ~/mudasky/env"

          scp ${SSH_OPTS} docker-compose.yml ${SSH_DEST}:~/mudasky/
          scp ${SSH_OPTS} db/init.sql ${SSH_DEST}:~/mudasky/db/
          scp ${SSH_OPTS} env/*.env ${SSH_DEST}:~/mudasky/env/

      - name: 部署到服务器
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
          BUILD_TAG: ${{ steps.version.outputs.tag }}
          DB_EXTERNAL_PORT: ${{ secrets.DB_EXTERNAL_PORT }}
          SSH_DEST: ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
          SSH_PORT: ${{ secrets.SERVER_PORT }}
        run: |
          ssh -p ${SSH_PORT} -i ~/.ssh/deploy_key ${SSH_DEST} \
            "GHCR_PAT='${GHCR_PAT}' REPO_OWNER='${REPO_OWNER}' BUILD_TAG='${BUILD_TAG}' DB_EXTERNAL_PORT='${DB_EXTERNAL_PORT}'" \
            /bin/bash << 'DEPLOY_EOF'
            set -e
            cd ~/mudasky

            # 登录 ghcr.io
            echo "${GHCR_PAT}" | docker login ghcr.io -u "${REPO_OWNER}" --password-stdin

            # 拉取最新镜像（网络不稳定时最多重试 3 次）
            for i in 1 2 3; do
              docker compose -f docker-compose.yml pull && break
              echo "拉取失败，第 ${i} 次重试..."
              sleep 10
            done

            # 持久化环境变量，重启后不丢失
            grep -q '^DB_VERSION=' .env 2>/dev/null \
              && sed -i "s/^DB_VERSION=.*/DB_VERSION=${BUILD_TAG}/" .env \
              || echo "DB_VERSION=${BUILD_TAG}" >> .env

            if [ -n "${DB_EXTERNAL_PORT}" ]; then
              grep -q '^DB_EXTERNAL_PORT=' .env 2>/dev/null \
                && sed -i "s/^DB_EXTERNAL_PORT=.*/DB_EXTERNAL_PORT=${DB_EXTERNAL_PORT}/" .env \
                || echo "DB_EXTERNAL_PORT=${DB_EXTERNAL_PORT}" >> .env
            fi

            # 滚动更新
            docker compose -f docker-compose.yml up -d --remove-orphans

            # 清理 mudasky 旧镜像
            docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' \
              | grep "ghcr.io/${REPO_OWNER}/mudasky" \
              | grep '<none>' \
              | awk '{print $2}' \
              | xargs -r docker rmi 2>/dev/null || true

            # 健康检查（最多重试 6 次，间隔 10 秒）
            for i in 1 2 3 4 5 6; do
              if curl -sf http://localhost/api/health; then
                echo "部署成功"
                exit 0
              fi
              echo "健康检查第 ${i} 次失败，等待 10 秒..."
              sleep 10
            done
            echo "健康检查超时"
            exit 1
          DEPLOY_EOF

  e2e-test:
    needs: deploy
    if: always() && vars.ENABLE_E2E == '1' && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v5
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: 安装依赖
        run: pnpm --prefix frontend install
      - name: 安装 Playwright 浏览器
        run: pnpm --prefix frontend exec playwright install --with-deps chromium
      - name: 生成 production.env
        run: |
          mkdir -p env
          cat > env/production.env << 'ENVEOF'
          BASE_URL=http://${{ secrets.SERVER_HOST }}
          INTERNAL_SECRET=${{ secrets.INTERNAL_SECRET }}
          SEED_USER_1_USERNAME=${{ secrets.SEED_USER_1_USERNAME }}
          SEED_USER_1_PASSWORD=${{ secrets.SEED_USER_1_PASSWORD }}
          DB_HOST=${{ secrets.SERVER_HOST }}
          DB_PORT=${{ secrets.DB_EXTERNAL_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          ENVEOF
      - name: 运行 E2E 测试
        run: |
          TEST_ENV=production pnpm --prefix frontend exec \
            playwright test --config e2e/playwright.config.ts
      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: frontend/test-results/
          retention-days: 7
