# mudasky OpenResty 主配置

worker_processes auto;
error_log /usr/local/openresty/nginx/logs/error.log warn;

events {
  worker_connections 1024;
}

http {
  include mime.types;
  default_type application/octet-stream;
  server_tokens off;

  log_format json_log escape=json
    '{"timestamp":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"user_id":"$http_x_user_id"}';

  access_log /usr/local/openresty/nginx/logs/access.log json_log;

  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 20m;

  lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

  # Docker DNS 解析器（用于 content_by_lua 中的 cosocket）
  resolver 127.0.0.11 ipv6=off;

  lua_shared_dict config 1m;
  lua_shared_dict rate_limit 10m;
  init_by_lua_block {
    local config_dict = ngx.shared.config
    config_dict:set("jwt_secret", os.getenv("JWT_SECRET") or "")
    config_dict:set("access_expire_minutes", tonumber(os.getenv("ACCESS_TOKEN_EXPIRE_MINUTES")) or 15)
    config_dict:set("refresh_expire_days", tonumber(os.getenv("REFRESH_TOKEN_EXPIRE_DAYS")) or 30)
    config_dict:set("internal_secret", os.getenv("INTERNAL_SECRET") or "")
    config_dict:set("backend_url", os.getenv("BACKEND_URL") or "http://api:8000")
    config_dict:set("rate_limit_multiplier", tonumber(os.getenv("RATE_LIMIT_MULTIPLIER")) or 1)
  }

  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-XSS-Protection "1; mode=block" always;

  include /etc/nginx/conf.d/*.conf;
}
