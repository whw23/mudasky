server {
  listen 80;
  server_name _;

  # refresh — 用 content_by_lua 接管
  location = /api/auth/refresh {
    content_by_lua_file /usr/local/openresty/nginx/lua/refresh_proxy.lua;
  }

  # 登录/注册 — 用 content_by_lua 接管，调后端后加 Cookie
  location ~ ^/api/auth/(login|register)$ {
    content_by_lua_file /usr/local/openresty/nginx/lua/auth_proxy.lua;
  }

  # 登出 — 代理到后端，注入用户 ID 和 token hash，清除 Cookie
  location = /api/auth/logout {
    access_by_lua_block {
      local jwt = require("resty.jwt")
      local config = require("init")
      local resty_sha256 = require("resty.sha256")
      local str_util = require("resty.string")
      local cookie_header = ngx.var.http_cookie
      if cookie_header then
        for pair in string.gmatch(cookie_header, "[^;]+") do
          local trimmed = string.gsub(pair, "^%%s+", "")
          local k, v = string.match(trimmed, "^(.-)=(.+)$")
          if k == "access_token" then
            local obj = jwt:verify(config.get_jwt_secret(), v)
            if obj.verified and obj.payload then
              ngx.req.set_header("X-User-Id", obj.payload.sub)
            end
          end
          if k == "refresh_token" then
            local sha = resty_sha256:new()
            sha:update(v)
            local digest = sha:final()
            ngx.req.set_header("X-Refresh-Token-Hash", str_util.to_hex(digest))
          end
        end
      end
    }
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;

    header_filter_by_lua_block {
      ngx.header["Set-Cookie"] = {
        "access_token=; Path=/; HttpOnly; SameSite=Strict; Max-Age=0",
        "refresh_token=; Path=/; HttpOnly; SameSite=Strict; Max-Age=0",
      }
    }
  }

  # 其他 API 路由
  location /api/ {
    access_by_lua_file /usr/local/openresty/nginx/lua/auth.lua;
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 面板路由权限守卫（admin / portal）
  location ~ ^/[a-z][a-z]/admin/ {
    access_by_lua_file /usr/local/openresty/nginx/lua/page_guard.lua;
    proxy_pass http://frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location ~ ^/[a-z][a-z]/portal/ {
    access_by_lua_file /usr/local/openresty/nginx/lua/page_guard.lua;
    proxy_pass http://frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location ~ ^/admin/ {
    access_by_lua_file /usr/local/openresty/nginx/lua/page_guard.lua;
    proxy_pass http://frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location ~ ^/portal/ {
    access_by_lua_file /usr/local/openresty/nginx/lua/page_guard.lua;
    proxy_pass http://frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # 前端
  location / {
    proxy_pass http://frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
