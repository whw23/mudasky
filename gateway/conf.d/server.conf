server {
  listen 80;
  server_name _;

  # refresh — 用 content_by_lua 接管
  location = /api/auth/refresh {
    content_by_lua_file /usr/local/openresty/nginx/lua/refresh_proxy.lua;
  }

  # 登录/注册 — 用 content_by_lua 接管，调后端后加 Cookie
  location ~ ^/api/auth/(login|register)$ {
    content_by_lua_file /usr/local/openresty/nginx/lua/auth_proxy.lua;
  }

  # 其他 API 路由
  location /api/ {
    access_by_lua_file /usr/local/openresty/nginx/lua/auth.lua;
    proxy_pass http://backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # 前端
  location / {
    proxy_pass http://frontend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
