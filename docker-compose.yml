services:
  gateway:
    build:
      context: ./gateway
      dockerfile: ../docker/gateway.Dockerfile
    ports:
      - "80:80"
    env_file: env/gateway.env
    depends_on:
      api:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["sh", "-c", "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm start"]
    environment:
      - CI=true
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./backend
      dockerfile: ../docker/api.Dockerfile
    env_file: env/backend.env
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ./backend
      dockerfile: ../docker/worker.Dockerfile
    env_file: env/worker.env
    depends_on:
      db:
        condition: service_healthy
    profiles: ["worker"]

  db:
    image: postgres:17-alpine
    env_file: env/db.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudasky"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  uploads:
