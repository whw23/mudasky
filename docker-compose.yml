x-common: &common
  environment:
    TZ: Asia/Shanghai

services:
  gateway:
    <<: *common
    image: ghcr.io/whw23/mudasky-gateway:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
    ports:
      - "80:80"
    env_file: env/gateway.env
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started

  frontend:
    <<: *common
    image: ghcr.io/whw23/mudasky-frontend:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      api:
        condition: service_healthy

  api:
    <<: *common
    image: ghcr.io/whw23/mudasky-api:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    env_file: env/backend.env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    <<: *common
    image: ghcr.io/whw23/mudasky-api:latest
    env_file: env/worker.env
    depends_on:
      db:
        condition: service_healthy
    profiles: ["worker"]

  db:
    <<: *common
    image: ghcr.io/whw23/mudasky-db:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    env_file: env/db.env
    command: postgres -c shared_preload_libraries=pg_cron -c cron.database_name=mudasky -c app.build_version=${DB_VERSION:-dev}
    ports:
      - "47293:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudasky"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
